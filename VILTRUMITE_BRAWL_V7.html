<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VILTRUMITE BRAWL V7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
:root{--p1:#00e5ff;--p2:#ff3d00;--bg:#04040e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;overflow:hidden;user-select:none;}
#gc{width:960px;height:540px;position:relative;transform-origin:center center;background:var(--bg);display:flex;flex-direction:column;}
#hud{display:flex;gap:10px;padding:8px 14px 6px;height:62px;align-items:center;flex-shrink:0;background:rgba(0,0,0,0.8);border-bottom:2px solid #12123a;}
.hb{flex:1;}
.pname{font-size:1rem;letter-spacing:4px;line-height:1;}
.bar-wrap{height:13px;background:#07071a;border-radius:2px;overflow:hidden;border:1px solid #1a1a40;margin-top:4px;position:relative;}
.bar{height:100%;width:100%;transition:width .06s linear;}
#p1hp{background:linear-gradient(90deg,#00e5ff,#00ff99);}
#p2hp{background:linear-gradient(270deg,#ff3d00,#ff9900);}
.ult-wrap{height:5px;background:#07071a;border-radius:1px;overflow:hidden;margin-top:3px;}
.ult{height:100%;width:0%;transition:width .06s linear;background:#9900cc;}
#tb{width:64px;flex-shrink:0;text-align:center;color:#fff;font-size:2.3rem;line-height:1;padding:3px 0;background:#0c0c22;border:1px solid #252555;border-radius:4px;transition:color .3s;}
canvas{flex:1;display:block;width:960px!important;}
#status{height:28px;line-height:28px;text-align:center;color:#fff;font-size:1.3rem;letter-spacing:10px;background:rgba(0,0,0,0.7);flex-shrink:0;}
#combo1,#combo2{position:absolute;top:70px;font-size:1.6rem;letter-spacing:4px;pointer-events:none;opacity:0;transition:opacity .25s;text-shadow:0 0 20px currentColor;}
#combo1{left:14px;color:var(--p1);}
#combo2{right:14px;color:var(--p2);text-align:right;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;z-index:99;}
#overlay h1{color:#fff;font-size:4rem;letter-spacing:12px;text-shadow:0 0 40px rgba(0,229,255,0.7),0 0 80px rgba(0,229,255,0.2);}
.subtitle{color:#505070;font-size:0.72rem;letter-spacing:6px;}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 34px;color:#484868;font-size:0.66rem;letter-spacing:2px;text-align:center;}
.ctrl-grid span{color:var(--p1);}
.legend{display:flex;gap:18px;font-size:0.6rem;letter-spacing:3px;color:#484868;}
.legend-item{display:flex;align-items:center;gap:6px;}
.leg-ring{width:10px;height:10px;border-radius:50%;border:2px solid;}
.divider{width:220px;height:1px;background:#141440;margin:2px 0;}
button{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:6px;padding:12px 38px;background:none;border:2px solid var(--p1);color:var(--p1);cursor:pointer;transition:all .2s;margin-top:6px;}
button:hover{background:var(--p1);color:#000;box-shadow:0 0 24px rgba(0,229,255,0.5);}
</style>
</head>
<body>
<div id="gc">
  <div id="hud">
    <div class="hb">
      <div class="pname" style="color:var(--p1)">MARK</div>
      <div class="bar-wrap"><div class="bar" id="p1hp"></div></div>
      <div class="ult-wrap"><div class="ult" id="p1ult"></div></div>
    </div>
    <div id="tb">99</div>
    <div class="hb" style="text-align:right">
      <div class="pname" style="color:var(--p2)">THRAGG</div>
      <div class="bar-wrap"><div class="bar" id="p2hp" style="float:right"></div></div>
      <div class="ult-wrap"><div class="ult" id="p2ult" style="float:right"></div></div>
    </div>
  </div>
  <div id="combo1"></div>
  <div id="combo2"></div>
  <canvas id="cv"></canvas>
  <div id="status"></div>
  <div id="overlay">
    <h1>VILTRUMITE BRAWL V7</h1>
    <div class="subtitle">PIXEL ARENA FIGHTER · 1 VS 1 · SPRITE EDITION</div>
    <div class="divider"></div>
    <div class="ctrl-grid">
      <div>MOVE <span>A / D</span></div>
      <div>JUMP <span>W</span></div>
      <div>DASH <span>Q</span></div>
      <div>PUNCH <span>E</span></div>
      <div>KICK <span>R</span></div>
      <div>GRAB <span>T</span></div>
      <div>BLOCK <span>F (hold)</span></div>
      <div>COUNTER <span>C (timing!)</span></div>
      <div colspan="2">ULTIMATE <span>V (full meter)</span></div>
    </div>
    <div class="divider"></div>
    <div class="legend">
      <div class="legend-item"><div class="leg-ring" style="border-color:#00e5ff"></div><span style="color:#444466">ATTACK — BLOCKABLE</span></div>
      <div class="legend-item"><div class="leg-ring" style="border-color:#ff9900"></div><span style="color:#444466">GRAB — UNBLOCKABLE</span></div>
    </div>
    <div class="subtitle" style="color:#383858">PUNCH→KICK COMBO · AIR ATTACKS · GRAB BREAKS BLOCK · WALL BOUNCE</div>
    <button id="startBtn">START FIGHT</button>
  </div>
</div>

// Ticks-per-frame (60fps game, ~8fps sprite animation)
const SPR_TPF = 7;
// Display scale: 108px sprite → ×2 = 216px tall on canvas
const SPR_SCALE = 2.0;
const SPR_W = 108 * SPR_SCALE;
const SPR_H = 108 * SPR_SCALE;

// Pre-load all sprite images from embedded base64.
// For Mark's Hover_* frames (JPEG with black baked in upstream), we color-key
// near-black pixels to alpha=0 so the parallax background shows through.
const SPRITE_IMAGES = [];
let spritesReady = false;

const COLOR_KEYED = new Set(['Hover_Idle','Hover_Forward','Hover_Backwards']);

function preloadSprites() {
  let total = 0, loaded = 0;
  SPRITE_DATA.forEach((char, ci) => {
    SPRITE_IMAGES[ci] = {};
    Object.entries(char.animations).forEach(([key, frames]) => {
      const colorKey = ci === 0 && COLOR_KEYED.has(key);
      SPRITE_IMAGES[ci][key] = frames.map(src => {
        total++;
        const slot = { ready: false, asset: null, w: 0, h: 0 };
        const img = new Image();
        img.onload = () => {
          const w = img.naturalWidth, h = img.naturalHeight;
          if (colorKey) {
            // Decode → drop near-black pixels → store transparent canvas
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const cx = c.getContext('2d');
            cx.drawImage(img, 0, 0);
            try {
              const d = cx.getImageData(0, 0, w, h);
              const px = d.data;
              for (let i = 0; i < px.length; i += 4) {
                if (px[i] + px[i+1] + px[i+2] < 30) px[i+3] = 0;
              }
              cx.putImageData(d, 0, 0);
            } catch (_) { /* tainted canvas; fall through to raw image */ }
            slot.asset = c;
          } else {
            slot.asset = img;
          }
          slot.w = w; slot.h = h; slot.ready = true;
          loaded++;
          if (loaded >= total) spritesReady = true;
        };
        img.src = src;
        return slot;
      });
    });
  });
  if (total === 0) spritesReady = true;
}

/**
 * Draw a fighter using real sprite frames.
 * Called inside ctx.save() / ctx.translate(f.x,f.y) / ctx.scale(f.facing*scX,scY)
 */
function drawSpriteChar(ctx, f, state) {
  const ci = (f === p1) ? 0 : 1;
  const map = ANIM_MAP[ci];
  const animKey = map[state] || 'Fight_Stance_Idle';
  const frames = SPRITE_IMAGES[ci]?.[animKey];
  if (!frames || !frames.length) return false;

  const numFrames = frames.length;
  const frameIdx = Math.floor(f.sf / SPR_TPF) % numFrames;
  const slot = frames[frameIdx];
  if (!slot || !slot.ready || !slot.w) return false;

  ctx.imageSmoothingEnabled = false;
  // Draw: bottom-center of sprite at (0,0) which is f.y in world space
  ctx.drawImage(slot.asset, -SPR_W / 2, -SPR_H, SPR_W, SPR_H);
  return true;
}

      dash:   ()=>{o.type='sine';o.frequency.setValueAtTime(700,w);o.frequency.exponentialRampToValueAtTime(160,w+.12);g.gain.setValueAtTime(.20,w);g.gain.exponentialRampToValueAtTime(.001,w+.15);o.start(w);o.stop(w+.18);},
      land:   ()=>{o.type='square';o.frequency.setValueAtTime(110,w);o.frequency.exponentialRampToValueAtTime(38,w+.08);g.gain.setValueAtTime(.22,w);g.gain.exponentialRampToValueAtTime(.001,w+.12);o.start(w);o.stop(w+.14);},
      crit:   ()=>{o.type='square';o.frequency.setValueAtTime(600,w);o.frequency.exponentialRampToValueAtTime(1200,w+.04);o.frequency.exponentialRampToValueAtTime(80,w+.15);g.gain.setValueAtTime(.55,w);g.gain.exponentialRampToValueAtTime(.001,w+.20);o.start(w);o.stop(w+.24);},

// ═══════════════ STATES ═══════════════
const S={
  IDLE:'idle',WALK:'walk',JUMP:'jump',FALL:'fall',
  DASH:'dash',
  PUNCH:'punch',KICK:'kick',GRAB:'grab',AIRPUNCH:'airpunch',
  COUNTER:'counter',COUNTERHIT:'counterHit',
  GRABBED:'grabbed',BLOCK:'block',
  HITSTUN:'hitstun',KNOCKDOWN:'knockdown',GETUP:'getup',
  ULTCHARGE:'ultCharge',ULTHIT:'ultHit',ULTFINISH:'ultFinish',
  VICTORY:'victory',
  // Mark-only hover states
  HOVER_IDLE:'hoverIdle',HOVER_FORWARD:'hoverForward',HOVER_BACKWARDS:'hoverBackwards',
  // ULT phase 2 (Mark): second-V power attack + opponent stun lock
  ULT_ACTIVATION_ATTACK:'ultActivationAttack',STUNNED:'stunned',
};

// Mark hovers 12px above the floor; helpers centralize that offset.
const HOVER_OFFSET = 12;
const groundY = (f) => (f === p1 ? FL - HOVER_OFFSET : FL);
const restIdle = (f) => (f === p1 ? S.HOVER_IDLE : S.IDLE);

// ═══════════════════════════════════════════════════════════════
// ATTACK DATA  — all values in frames (60fps)
//
//  sp  = startup frames before hitbox is active
//  ac  = active frames (hitbox live)
//  rc  = recovery frames after active window
//  dmg = base damage
//  ug  = ultimate meter gain on hit
//  hs  = hitstun on the defender (not grabbed)
//  bs  = blockstun on the defender
//  kx  = knockback X (* attacker facing)
//  ky  = knockback Y (negative = up)
//
//  MARK  — fast, precise, moderate recovery
//  THRAGG — slower startup & recovery, hits harder, grabs longer
// ═══════════════════════════════════════════════════════════════
const ATK={
  punch:    {sp:4, ac:4, rc:11, dmg:9,  ug:5,  hs:14, bs:5,  kx:7,  ky:-2,  snd:'punch'},

const ATK_T={
  // Thragg: +2 startup (more readable wind-up), +40% recovery, higher damage

  kick:     {sp:9,  ac:5, rc:26, dmg:17, ug:9,  hs:26, bs:10, kx:14, ky:-13, snd:'kick'},

// ═══════════════ FIGHTER FACTORY ═══════════════
// V8 balance: per-fighter max HP. Ult damage scales as 25% of attacker.maxHp.
const MAX_HP_MARK = 500, MAX_HP_THRAGG = 600;

function makeFighter(x,facing,isBot,maxHp){

// ═══════════════ HELPERS ═══════════════
function canAct(f){
  return !f.ultActive&&
    f.state!==S.GRABBED&&f.state!==S.HITSTUN&&
    f.state!==S.KNOCKDOWN&&f.state!==S.GETUP&&
    f.state!==S.ULTCHARGE&&f.state!==S.ULTHIT&&
    f.state!==S.ULTFINISH&&f.state!==S.VICTORY&&
    f.state!==S.ULT_ACTIVATION_ATTACK&&f.state!==S.STUNNED;
}
function isAtk(f){return[S.PUNCH,S.KICK,S.GRAB,S.AIRPUNCH].includes(f.state);}
function inActive(f){return isAtk(f)&&f.atkSp<=0&&f.atkAc>0;}
function opp(f){return f===p1?p2:p1;}
function getATK(f,type){return f===p2?ATK_T[type]||ATK[type]:ATK[type];}

// ═══════════════ ACTIONS ═══════════════
function doAtk(f,type){
  if(!canAct(f)||isAtk(f)) return;
  if(!f.onGround){
    if(f.airAttacked) return;
    f.airAttacked=true;f.state=S.AIRPUNCH;f.atkType='airpunch';
    const d=getATK(f,'airpunch');
    f.atkSp=d.sp;f.atkAc=d.ac;f.atkRc=d.rc;f.atkHit=false;f.sf=0;
    sfx('punch');f.atkIndicator='strike';f.atkIndTimer=5;return;
  }
  const d=getATK(f,type);
  let sp=d.sp;
  // Punch → Kick combo: reduced startup
  if(f.lastAtkType==='punch'&&type==='kick'&&(frameCount-f.lastAtkTime)<30){
    sp=Math.max(2,sp-3);
    if(f===p1){p1Combo++;p1ComboTimer=90;}else{p2Combo++;p2ComboTimer=90;}
    updateComboDisplay();
  }
  f.state=type==='punch'?S.PUNCH:type==='kick'?S.KICK:S.GRAB;
  f.atkType=type;f.atkSp=sp;f.atkAc=d.ac;f.atkRc=d.rc;f.atkHit=false;f.sf=0;
  sfx(d.snd);
  f.atkIndicator=type==='grab'?'grab':'strike';
  // Indicator duration = startup + 1 frame so it's visible before hitbox goes live
  f.atkIndTimer=sp+1;
}

function doDash(f){
  if(!canAct(f)||f.dashCD>0||!f.onGround) return;
  // Thragg has a longer dash cooldown (heavier momentum)
  const cd=f===p2?48:34;
  f.state=S.DASH;f.dashTimer=12;f.dashCD=cd;f.sf=0;
  f.vx=f.facing*18;squash(f,1.32,0.76,5);sfx('dash');
  f.dashTrail=[];
  for(let i=0;i<3;i++){
    rings.push({x:f.x,y:f.y-55,r:4+i*6,maxR:36+i*16,
                color:f===p1?'#00e5ff':'#ff5500',life:0,ml:0});
    const rg=rings[rings.length-1];rg.life=rg.ml=10+i*2;
  }
}

function doCounter(f){
  if(!canAct(f)||!f.onGround||f.state===S.BLOCK) return;
  // V6: tighter 16-frame window (was 24) — skilled move, not a panic button
  f.state=S.COUNTER;f.counterTimer=16;f.sf=0;f.counterActive=true;
  sfx('block');
}

function doUlt(f){
  const op=opp(f);
  if(!op) return;
  // Phase 2: second V press while still in ULTCHARGE → activation attack + 3s opponent stun
  if(f.ultActive&&f.state===S.ULTCHARGE){
    f.state=S.ULT_ACTIVATION_ATTACK;f.sf=0;f.ultTimer=0;f.vx=0;
    op.state=S.STUNNED;op.stunTimer=180;op.vx=0;op.sf=0;
    sfx('ult_hit');
    shake(16);addFlash('rgba(255,255,255,0.55)',8);
    burst(op.x,op.y-60,f===p1?'#00e5ff':'#ff3d00',26);
    addFloat('STUNNED!',op.x,op.y-110,'#ffe066');
    return;
  }
  // Phase 1: initial trigger — start charge
  if(f.ult<100||f.ultActive||!canAct(f)) return;
  f.ult=0;f.ultActive=true;f.ultStep=0;f.ultTimer=0;
  f.state=S.ULTCHARGE;f.sf=0;
  sfx('ult_charge');
  shake(12);addFlash(f===p1?'rgba(0,229,255,0.45)':'rgba(255,61,0,0.45)',24);
  spawnAura(f);
}

// ═══════════════ HIT DETECTION ═══════════════
// V6: Thragg's grab reach slightly longer to reflect massive arms
const REACH={punch:85,kick:108,grab:78,airpunch:90};
function getReach(f,type){return type==='grab'&&f===p2?90:REACH[type];}

function checkHit(a,d){
  if(!inActive(a)||a.atkHit) return;
  // ULT phase 2: stunned opponents are invulnerable — no free-kill window.
  if(d.state===S.STUNNED) return;
  const dist=Math.abs(a.x-d.x);
  if(dist>getReach(a,a.atkType)) return;
  if(Math.sign(d.x-a.x)!==a.facing&&dist>35) return;

  // Counter parry — not triggered by grabs
  if(d.counterActive&&d.state===S.COUNTER&&a.atkType!=='grab'){
    d.counterActive=false;d.state=S.COUNTERHIT;d.sf=0;
    a.state=S.HITSTUN;a.stunTimer=36;
    a.vx=-a.facing*11;a.vy=-10;a.onGround=false;a.flash=14;
    hitStop=10;shake(7);sfx('counter');
    burst(d.x,d.y-65,'#ffffff',20);
    addFloat('COUNTER!',d.x,d.y-102,'#ffffff');
    addFloat('-18',a.x,a.y-76,d===p1?'#00e5ff':'#ff3d00');
    a.hp=Math.max(0,a.hp-18);
    d.ult=Math.min(100,d.ult+14);
    return;
  }

  a.atkHit=true;
  a.lastAtkType=a.atkType;a.lastAtkTime=frameCount;
  const ad=getATK(a,a.atkType);
  const blocked=d.state===S.BLOCK&&a.atkType!=='grab';
  // V6: crit rate reduced 6% → 4%
  const crit=Math.random()<0.04;

  if(blocked){
    d.hp=Math.max(0,d.hp-2);
    d.state=S.HITSTUN;d.stunTimer=ad.bs;
    // V6: block pushback — forces space, discourages mindless spam
    d.vx=-d.facing*4;
    a.vx=-a.facing*2;
    hitStop=4;shake(2);sfx('block');
    squash(d,1.09,0.93,4);
    burst(d.x-d.facing*26,d.y-58,'#8888cc',5);
    addFloat('BLOCK',d.x,d.y-94,'#aaaaff');

  }else if(a.atkType==='grab'){
    d.hp=Math.max(0,d.hp-ad.dmg);
    a.ult=Math.min(100,a.ult+ad.ug);
    d.flash=12;d.state=S.GRABBED;d.stunTimer=ad.hs;
    // V6 FIX: store initial stun to correctly drive grabPhase ratio
    d.grabInitStun=ad.hs;d.grabPhase=0;
    hitStop=12;shake(9);
    squash(d,0.68,1.42,10);squash(a,1.12,0.9,5);
    burst(d.x,d.y-64,'#ff8800',20);
    addFloat('-'+ad.dmg,d.x,d.y-90,a===p1?'#00e5ff':'#ff3d00');
    checkUltReady(a);

  }else{
    const fd=Math.round(ad.dmg*(crit?1.65:1));
    d.hp=Math.max(0,d.hp-fd);
    a.ult=Math.min(100,a.ult+ad.ug+(crit?4:0));
    d.flash=10;
    d.vx=ad.kx*a.facing;d.vy=a.atkType==='kick'?-15:ad.ky;
    d.state=S.HITSTUN;d.stunTimer=ad.hs;d.onGround=false;
    squash(d,0.76,1.3,8);squash(a,1.14,0.9,5);
    // V6: Thragg hits land with extra hitstop weight
    const base=a.atkType==='kick'?11:8;
    hitStop=a===p2?base+3:base;
    shake(a.atkType==='kick'?7:5);
    if(crit){sfx('crit');addFlash('rgba(255,255,255,0.28)',5);}
    burst(d.x,d.y-64,a===p1?'#00aaff':'#ff5500',crit?22:13);
    addFloat(crit?('⚡'+fd+'!'):('-'+fd),d.x,d.y-92,
             crit?'#ffffff':a===p1?'#00e5ff':'#ff3d00');
    checkUltReady(a);
    if(a===p1){p1Combo++;p1ComboTimer=90;}else{p2Combo++;p2ComboTimer=90;}
    updateComboDisplay();
  }
}

function checkUltReady(f){
  if(f.ult>=100) addFloat('ULTIMATE!',f.x,f.y-136,f===p1?'#00e5ff':'#ff3d00');
}
function updateComboDisplay(){
  const c1=document.getElementById('combo1'),c2=document.getElementById('combo2');
  if(p1Combo>=2){c1.textContent=p1Combo+' HIT COMBO';c1.style.opacity='1';}
  if(p2Combo>=2){c2.textContent=p2Combo+' HIT COMBO';c2.style.opacity='1';}
}

// ═══════════════ ULTIMATE ═══════════════
function updateUlt(f){
  if(!f.ultActive) return;
  const op=opp(f);f.ultTimer++;

  if(f.state===S.ULTCHARGE){
    const dir=Math.sign(op.x-f.x);
    f.vx=dir*20;f.facing=dir||f.facing;
    if(f.ultTimer%4===0) spawnTrail(f);
    if(f.ultTimer>=26||Math.abs(f.x-op.x)<60){
      f.vx=0;f.state=S.ULTHIT;f.ultTimer=0;f.ultStep=0;
      op.state=S.GRABBED;op.stunTimer=999;
      f.x=op.x-f.facing*55;
    }
  }else if(f.state===S.ULTHIT){
    // V8: total ult damage = 25% of attacker.maxHp.
    // Split as ~60% across 6 small hits + ~40% final hit.
    const ultTotal=Math.round(0.25*f.maxHp);
    const smallEach=Math.round(ultTotal*0.6/6);
    if(f.ultTimer%10===0&&f.ultStep<6){
      f.ultStep++;
      const d=smallEach;
      op.hp=Math.max(0,op.hp-d);op.flash=9;
      hitStop=10;shake(6);sfx('ult_hit');
      burst(op.x,op.y-72,f===p1?'#00e5ff':'#ff5500',16);
      addFloat('-'+d,op.x+(Math.random()-.5)*46,op.y-82-f.ultStep*14,f===p1?'#00e5ff':'#ff3d00');
    }
    if(f.ultStep>=6){
      const fd=ultTotal-smallEach*6;
      op.hp=Math.max(0,op.hp-fd);op.flash=18;
      op.state=S.HITSTUN;op.stunTimer=52;
      op.vx=f.facing*30;op.vy=-26;op.onGround=false;
      f.state=S.ULTFINISH;f.ultTimer=0;
      hitStop=22;shake(18);
      addFlash(f===p1?'rgba(0,229,255,0.7)':'rgba(255,80,0,0.7)',20);
      sfx('ult_hit');
      burst(op.x,op.y-60,'#ffffff',40);
      addFloat('-'+fd,op.x,op.y-120,'#ffffff');
      squash(op,0.5,1.65,14);
    }
  }else if(f.state===S.ULTFINISH){
    if(f.ultTimer>=44){f.ultActive=false;f.state=restIdle(f);}
  }else if(f.state===S.ULT_ACTIVATION_ATTACK){
    // Power-attack pose plays for ~30 frames, then the ult ends.
    // Opponent stays stunned for the full 180-frame window (handled in their state machine).
    if(f.ultTimer>=30){f.ultActive=false;f.state=restIdle(f);}
  }
}

// ═══════════════ SQUASH/STRETCH ═══════════════
function squash(f,sx,sy,dur){f.scX=sx;f.scY=sy;f.scTimer=dur;}

// ═══════════════ PHYSICS & STATE UPDATE ═══════════════
function updateFighter(f){
  if(hitStop>0) return;
  const op=opp(f);
  f.sf++;f.bobF++;
  if(f.dashCD>0) f.dashCD--;
  if(f.flash>0) f.flash--;
  if(f.atkIndTimer>0) f.atkIndTimer--;
  if(f.botReactCD>0) f.botReactCD--;

  if(f.scTimer>0){f.scTimer--;if(f.scTimer===0){f.scX=1;f.scY=1;}}
  else{f.scX+=(1-f.scX)*.25;f.scY+=(1-f.scY)*.25;}

  if(!f.onGround) f.vy+=0.74;
  f.x+=f.vx;f.y+=f.vy;
  // Thragg: higher ground friction (heavier body stops faster)
  f.vx*=f.onGround?(f===p2?.60:.67):.92;
  f.x=Math.max(WL,Math.min(WR,f.x));

  // Wall bounce in hitstun
  if((f.x===WL||f.x===WR)&&f.state===S.HITSTUN){
    f.vx*=-0.6;shake(5);burst(f.x,f.y-55,'#ffffff',12);
    addFloat('WALL!',f.x,f.y-82,'#dddddd');
  }

  // Mark rests at FL - HOVER_OFFSET; Thragg at FL.
  const _gy = groundY(f);
  if(f.y>=_gy){
    const wasAir=!f.onGround;
    f.y=_gy;f.vy=0;f.onGround=true;f.airAttacked=false;
    if(wasAir){
      if(f.state===S.HITSTUN&&f.stunTimer>5){
        f.state=S.KNOCKDOWN;
        // V6: Thragg knockdown stun slightly longer (heavier = slower getup)
        f.stunTimer=f===p2?52:42;f.sf=0;
        shake(f===p2?9:5);
        squash(f,f===p2?1.3:1.22,f===p2?0.60:0.68,f===p2?13:9);
        burst(f.x,FL,'#223344',f===p2?16:9);sfx('land');
      }else if([S.FALL,S.JUMP,S.AIRPUNCH].includes(f.state)){
        f.state=restIdle(f);squash(f,1.14,0.86,5);sfx('land');
      }
    }
  }

  if(!f.ultActive&&[S.IDLE,S.WALK,S.BLOCK,S.COUNTER,S.HOVER_IDLE,S.HOVER_FORWARD,S.HOVER_BACKWARDS].includes(f.state))
    f.facing=op.x>=f.x?1:-1;

  switch(f.state){
    case S.IDLE: break;
    case S.WALK:
      f.walkT++;if(f.walkT>=9){f.walkT=0;f.walkF^=1;}
      if(Math.abs(f.vx)<0.5) f.state=S.IDLE;
      break;
    case S.HOVER_IDLE: break;
    case S.HOVER_FORWARD: case S.HOVER_BACKWARDS:
      f.walkT++;if(f.walkT>=9){f.walkT=0;f.walkF^=1;}
      if(Math.abs(f.vx)<0.5) f.state=S.HOVER_IDLE;
      break;
    case S.JUMP: if(f.vy>=0) f.state=S.FALL; break;
    case S.FALL: if(f.onGround) f.state=restIdle(f); break;
    case S.DASH:
      if(f.dashTimer%2===0){
        f.dashTrail.push({x:f.x,y:f.y,facing:f.facing});
        if(f.dashTrail.length>4) f.dashTrail.shift();
      }
      f.dashTimer--;if(f.dashTimer<=0){f.vx=0;f.state=restIdle(f);f.dashTrail=[];}
      break;
    case S.PUNCH:case S.KICK:case S.GRAB:case S.AIRPUNCH:
      if(f.atkSp>0) f.atkSp--;
      else if(f.atkAc>0){checkHit(f,op);f.atkAc--;}
      else if(f.atkRc>0) f.atkRc--;
      else{f.state=f.onGround?restIdle(f):S.FALL;f.atkType=null;}
      break;
    case S.COUNTER:
      f.counterTimer--;if(f.counterTimer<=0){f.counterActive=false;f.state=restIdle(f);}
      break;
    case S.COUNTERHIT: if(f.sf>=22) f.state=restIdle(f); break;
    case S.GRABBED:
      f.stunTimer--;
      // V6 FIX: proper ratio using stored initial stun (was always 0 before)
      if(f.grabInitStun>0){
        const ratio=f.stunTimer/f.grabInitStun;
        f.grabPhase=ratio>0.55?0:ratio>0.15?1:2;
      }
      // V6: grab release pops victim upward for a more dramatic throw arc
      if(f.stunTimer<=0){f.vy=-11;f.vx=f.facing*-5;f.state=S.FALL;f.onGround=false;sfx('throw');}
      break;
    case S.HITSTUN: f.stunTimer--;if(f.stunTimer<=0){f.state=f.onGround?restIdle(f):S.FALL;} break;
    case S.KNOCKDOWN: f.stunTimer--;if(f.stunTimer<=0){f.state=S.GETUP;f.sf=0;} break;
    case S.GETUP: if(f.sf>=34) f.state=restIdle(f); break;
    case S.ULTCHARGE:case S.ULTHIT:case S.ULTFINISH:case S.ULT_ACTIVATION_ATTACK: updateUlt(f); break;
    case S.STUNNED:
      f.vx=0;
      f.stunTimer--;
      if(f.stunTimer<=0) f.state=restIdle(f);
      break;
    case S.VICTORY: break;
  }
}

// ═══════════════ BOT AI ═══════════════
function botUpdate(){
  const f=p2,op=p1;
  if(!gameRunning||phase!=='fight'||!f||!op) return;
  if(f.win||op.win) return;
  if(f.state===S.BLOCK&&!inActive(op)) f.state=S.IDLE;
  if(!canAct(f)) return;

  const dist=Math.abs(f.x-op.x);

  // V6 FIX: botReactCD gates reactions so the bot can't block every single frame.
  // Without this, the effective block rate was ~99% whenever the player attacked.
  if(inActive(op)&&dist<124&&!isAtk(f)&&f.botReactCD===0){
    const rv=Math.random();
    if(rv<0.32){
      f.state=S.BLOCK;
      f.botReactCD=22; // won't try to react again for ~22 frames
    }else if(rv<0.42){
      doCounter(f);
      f.botReactCD=30;
    }
    return;
  }

  if(f.ult>=100&&dist<145&&Math.random()<0.022){doUlt(f);return;}

  f.botTimer++;
  if(f.botTimer>=f.botNextDec){
    f.botTimer=0;f.botNextDec=18+(Math.random()*22|0);
    const rv=Math.random(),hpR=f.hp/100,opHpR=op.hp/100;

    // V6: smarter decisions — Thragg prefers grab at close range,
    // retreats when at very low hp, pursues more aggressively when winning big
    if(dist>190) f.botAction='approach';
    else if(dist<44) f.botAction='retreat';
    else if(rv<0.20&&dist<88) f.botAction='punch';
    else if(rv<0.38&&dist<112) f.botAction='kick';
    else if(rv<0.56&&dist<80) f.botAction='grab';   // slightly more grab-hungry
    else if(rv<0.66&&f.dashCD===0&&dist>130) f.botAction='dash';
    else if(rv<0.78&&hpR<0.28) f.botAction='retreat';
    else if(opHpR<0.35&&rv<0.88) f.botAction='approach'; // press advantage
    else f.botAction='approach';
  }
  switch(f.botAction){
    case 'approach': f.vx=Math.sign(op.x-f.x)*3.4;f.state=S.WALK; break;
    case 'retreat':  f.vx=-Math.sign(op.x-f.x)*2.8;f.state=S.WALK; break;
    case 'punch':    dist<96?doAtk(f,'punch'):f.botAction='approach'; break;
    case 'kick':     dist<118?doAtk(f,'kick'):f.botAction='approach'; break;
    case 'grab':     dist<80?doAtk(f,'grab'):f.botAction='approach'; break;
    case 'dash':     doDash(f);f.botAction='approach'; break;
  }
  // Occasional jump to dodge low attacks
  if(f.onGround&&isAtk(op)&&dist<100&&Math.random()<0.012){
    f.vy=-14;f.onGround=false;f.state=S.JUMP;
  }
}

// ═══════════════ VFX ═══════════════
function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*12;
    const p={x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,
             color,size:2+Math.random()*4.5,sq:Math.random()>.45,life:0,ml:0};
    p.life=p.ml=14+(Math.random()*15|0);particles.push(p);
  }
}
function spawnAura(f){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,rr=24+Math.random()*80;
    const p={x:f.x+Math.cos(a)*rr,y:f.y-80+Math.sin(a)*rr,
             vx:Math.cos(a)*2.8,vy:Math.sin(a)*2.8-5.5,
             color:f===p1?'#00e5ff':'#ff3d00',size:3+Math.random()*5,sq:true,life:0,ml:0};
    p.life=p.ml=24+(Math.random()*10|0);particles.push(p);
  }
}
function spawnTrail(f){
  for(let i=0;i<6;i++){
    const p={x:f.x+(Math.random()-.5)*18,y:f.y-55+(Math.random()-.5)*32,
             vx:(Math.random()-.5)*2.5,vy:-1.5-Math.random()*2.5,
             color:f===p1?'#00e5ff':'#ff5500',size:2+Math.random()*3,sq:false,life:0,ml:0};
    p.life=p.ml=12+(Math.random()*8|0);particles.push(p);
  }
}
function shake(a){shakeAmt=Math.max(shakeAmt,a);}
function addFlash(c,fr){flashColor=c;flashFrames=fr;}
function addFloat(txt,x,y,color){floats.push({txt,x,y,vy:-1.9,life:44,ml:44,color});}

// ═══════════════ GET DRAW STATE ═══════════════
function getDS(f){
  if(f.win) return 'victory';
  switch(f.state){
    case S.VICTORY:   return 'victory';
    case S.GRABBED:   return 'grabbed';
    case S.HITSTUN:   return 'hitstun';
    case S.KNOCKDOWN: case S.GETUP: return 'knockdown';
    case S.ULTCHARGE: return 'ultCharge';
    case S.ULTHIT:    return 'ultHit';
    case S.ULTFINISH: return 'ultFinish';
    case S.BLOCK:     return 'block';
    case S.DASH:      return 'dash';
    case S.PUNCH:     return 'punch';
    case S.KICK:      return 'kick';
    case S.GRAB:      return 'grab';
    case S.AIRPUNCH:  return 'airpunch';
    case S.COUNTER:   return 'counter';
    case S.COUNTERHIT: return 'counterHit';
    case S.JUMP: case S.FALL: return 'jump';
    case S.WALK:      return 'walk';
    case S.HOVER_IDLE:      return 'hoverIdle';
    case S.HOVER_FORWARD:   return 'hoverForward';
    case S.HOVER_BACKWARDS: return 'hoverBackwards';
    case S.ULT_ACTIVATION_ATTACK: return 'ultActivationAttack';
    case S.STUNNED:         return 'stunned';
    default:          return 'idle';
  }
}

// ═══════════════ DRAW FIGHTER ═══════════════
function drawFighter(f){
  if(!p1||!p2) return;
  const state=getDS(f);
  const isT=f===p2;

  // Ground shadow
  const sA=f.onGround?0.35:Math.max(0.08,0.35-Math.abs(f.y-FL)/300);
  ctx.globalAlpha=sA;ctx.fillStyle='rgba(0,0,0,1)';
  ctx.beginPath();ctx.ellipse(f.x,FL+6,isT?40:34,isT?10:8,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // Dash afterimages
  if(f.dashTrail&&f.dashTrail.length>0){
    f.dashTrail.forEach((pt,i)=>{
      ctx.save();ctx.translate(pt.x,pt.y);ctx.scale(pt.facing*f.scX,f.scY);
      ctx.globalAlpha=(i+1)/f.dashTrail.length*0.16;
      if(f===p1){
        // Mark dash trail uses the sprite system; skip if not ready.
        if(spritesReady) drawSpriteChar(ctx, f, 'dash');
      }else drawThragg(ctx,'dash',0);
      ctx.globalAlpha=1;ctx.restore();
    });
  }

  // Attack indicator ring
  if(f.atkIndTimer>0){
    const isG=f.atkIndicator==='grab';
    const col=isG?'#ff9900':'#00e5ff';
    const al=f.atkIndTimer/(getATK(f,f.atkType||'punch').sp+1)*0.85;
    const hw=spritesReady?Math.round(SPR_W*0.38):(isT?40:32);
    const hh=spritesReady?Math.round(SPR_H*0.55):(isT?60:52);
    ctx.save();ctx.globalAlpha=Math.max(0,al);
    ctx.strokeStyle=col;ctx.lineWidth=isG?3:2;ctx.shadowBlur=isG?22:12;ctx.shadowColor=col;
    if(isG){
      ctx.beginPath();ctx.ellipse(f.x,f.y-hh,hw+6,hh+6,0,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=Math.max(0,al*0.4);
      ctx.beginPath();ctx.ellipse(f.x,f.y-hh,hw+16,hh+16,0,0,Math.PI*2);ctx.stroke();
    }else{
      const fx=f.x+f.facing*(hw+4);
      ctx.beginPath();ctx.arc(fx,f.y-62,isT?18:14,0,Math.PI*2);ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
  }

  ctx.save();
  ctx.translate(f.x,f.y);

  // Grab victim shake (V6 FIX: grabPhase is now correctly tracked)
  if(f.state===S.GRABBED){
    const shk=f.grabPhase===1?Math.sin(frameCount*2.2)*2.8
              :f.grabPhase===2?Math.sin(frameCount*3.5)*1.6:0;
    ctx.translate(shk,0);
  }

  ctx.scale(f.facing*f.scX,f.scY);

  // Ultimate aura
  if(f.ultActive){
    const t=frameCount*.1,gA=0.18+Math.sin(t)*0.08;
    ctx.globalAlpha=gA;ctx.fillStyle=f===p1?'#00e5ff':'#ff5500';
    ctx.beginPath();ctx.ellipse(0,-55*f.scY,38,62,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<5;i++){
      const ang=t+i*Math.PI*.4;
      ctx.globalAlpha=0.7+Math.sin(t*2+i)*.25;
      ctx.beginPath();ctx.arc(Math.cos(ang)*34,-55+Math.sin(ang)*28,5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Try sprite first; for Mark we never fall back to the hand-drawn pixel
  // art — the sprite path is the only authoritative renderer for him.
  const usedSprite = spritesReady && drawSpriteChar(ctx, f, state);
  if (!usedSprite && f !== p1) {
    drawThragg(ctx, state, f.sf);
  }

  // Hit flash
  if(f.flash>0){
    ctx.globalAlpha=f.flash/12*.55;ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='#ffffff';
    const hw=spritesReady?(SPR_W/2):(isT?34:28);
    const hh=spritesReady?SPR_H:(isT?118:100);
    ctx.fillRect(-hw,-hh,hw*2,hh);
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  }
  // Counter glow
  if(f.state===S.COUNTER){
    const pa=0.4+Math.sin(frameCount*.3)*.25;
    ctx.globalAlpha=pa;ctx.fillStyle=f===p1?'#00ffff':'#ff6600';
    ctx.beginPath();ctx.arc(0,-60,32,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ═══════════════ BACKGROUND ═══════════════
const BG_LAYERS = { sky: null, buildings: null, foreground: null };
let bgReady = false, bgLoading = false;

function preloadBackground(){
  if(bgReady || bgLoading) return;
  bgLoading = true;
  fetch('Background_Base64.txt')
    .then(r => r.text())
    .then(dataUrl => {
      const img = new Image();
      img.onload = () => {
        BG_LAYERS.sky = img; BG_LAYERS.buildings = img; BG_LAYERS.foreground = img;
        bgReady = true;
      };
      img.onerror = () => { bgLoading = false; };
      img.src = dataUrl.trim();
    })
    .catch(() => { bgLoading = false; });
}

function drawBG(){
  if(bgReady){
    // Parallax image background — camX centers the arena between fighters.
    const camX = (p1 && p2) ? (((p1.x + p2.x) / 2) - 480) * 0.1 : 0;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(BG_LAYERS.sky,        camX * -0.2, 0, CW, CH);
    ctx.drawImage(BG_LAYERS.buildings,  camX * -0.5, 0, CW, CH);
    ctx.drawImage(BG_LAYERS.foreground, camX * -1.0, 0, CW, CH);
    return;
  }
  const sg=ctx.createLinearGradient(0,0,0,CH);
  sg.addColorStop(0,'#010108');sg.addColorStop(1,'#060618');
  ctx.fillStyle=sg;ctx.fillRect(0,0,CW,CH);
  const stars=[[42,28],[115,16],[198,42],[335,20],[448,33],[576,18],[698,38],
    [818,26],[898,14],[58,68],[276,62],[498,52],[748,72],[155,44],
    [820,55],[380,35],[510,22],[660,44],[720,15],[85,50],[240,18],
    [420,58],[640,30],[770,48],[920,35],[30,45],[550,12],[180,70]];
  stars.forEach(([sx,sy])=>{
    ctx.globalAlpha=( Math.sin(frameCount*.03+sx*.09)*.35+.65)*.55;
    ctx.fillStyle='#fff';ctx.fillRect(sx,sy,2,2);
  });
  ctx.globalAlpha=1;
  const neb=ctx.createRadialGradient(480,200,20,480,200,320);
  neb.addColorStop(0,'rgba(25,10,55,0.4)');neb.addColorStop(1,'transparent');
  ctx.fillStyle=neb;ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#090918';
  ctx.beginPath();
  [[0,315],[85,232],[188,274],[298,202],[416,248],[530,218],[648,260],[775,228],[878,255],[960,295],[960,FL],[0,FL]]
    .forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#0b0b1e';
  ctx.beginPath();
  [[0,352],[145,332],[298,346],[478,328],[618,342],[775,330],[960,348],[960,FL],[0,FL]]
    .forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.018)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,FL);ctx.stroke();}
  for(let y=0;y<FL;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  drawPillar(55,FL-195,30,195);drawPillar(CW-85,FL-195,30,195);
  ctx.fillStyle='#0c0c22';ctx.fillRect(0,FL,CW,CH-FL);
  ctx.strokeStyle='rgba(255,255,255,0.038)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=48){ctx.beginPath();ctx.moveTo(x,FL);ctx.lineTo(x,CH);ctx.stroke();}
  const fg=ctx.createLinearGradient(0,FL-6,0,FL+64);
  fg.addColorStop(0,'rgba(0,150,255,0.30)');fg.addColorStop(.45,'rgba(0,80,190,0.07)');
  fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,FL-6,CW,70);
  ctx.strokeStyle='rgba(0,190,255,0.72)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,FL);ctx.lineTo(CW,FL);ctx.stroke();
}
function drawPillar(x,y,w,h){
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(x+5,y+5,w,h);
  ctx.fillStyle='#141432';ctx.fillRect(x,y,w,h);ctx.fillStyle='#1e1e50';ctx.fillRect(x,y,4,h);
  ctx.fillStyle='#0d0d26';ctx.fillRect(x+9,y+12,w-14,h-24);
  ctx.fillStyle='#262660';ctx.fillRect(x-6,y,w+12,9);
  ctx.fillStyle='rgba(0,170,255,0.14)';ctx.fillRect(x-6,y,w+12,4);
}

// ═══════════════ COUNTDOWN ═══════════════
function drawCountdown(){
  const sec=Math.floor(cdFrame/60);
  const txt=sec>=3?'FIGHT!':(3-sec).toString();
  const frac=(cdFrame%60)/60;
  const alpha=frac<0.2?frac*5:frac>0.65?(1-frac)/0.35:1;
  ctx.globalAlpha=Math.min(1,Math.max(0,alpha));
  ctx.textAlign='center';ctx.shadowBlur=32;
  ctx.shadowColor=sec>=3?'#ff3d00':'#00e5ff';
  ctx.fillStyle=sec>=3?'#ff5522':'#ffffff';
  ctx.font=`900 ${sec>=3?80:92}px "Bebas Neue",sans-serif`;
  ctx.fillText(txt,CW/2,CH/2+42);
  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// ═══════════════ HUD ═══════════════
function updateHUD(){
  if(!p1||!p2) return;
  const p1Pct=(p1.hp/p1.maxHp)*100, p2Pct=(p2.hp/p2.maxHp)*100;
  document.getElementById('p1hp').style.width=p1Pct+'%';
  document.getElementById('p2hp').style.width=p2Pct+'%';
  document.getElementById('p1ult').style.width=p1.ult+'%';
  document.getElementById('p2ult').style.width=p2.ult+'%';
  const pulse=Math.sin(frameCount*.16)>.5?'#ff00ff':'#cc00ff';
  document.getElementById('p1ult').style.background=p1.ult>=100?pulse:'#9900cc';
  document.getElementById('p2ult').style.background=p2.ult>=100?pulse:'#9900cc';
  document.getElementById('p1hp').style.background=
    p1Pct<25?'linear-gradient(90deg,#ff2200,#ff6600)':'linear-gradient(90deg,#00e5ff,#00ff99)';
  document.getElementById('p2hp').style.background=
    p2Pct<25?'linear-gradient(270deg,#ff2200,#ff6600)':'linear-gradient(270deg,#ff3d00,#ff9900)';
}

// ═══════════════ WIN CHECK ═══════════════
function checkWin(){
  if(!gameRunning||phase!=='fight'||!p1||!p2) return;
  if(p1.hp>0&&p2.hp>0&&roundTimer>0) return;
  gameRunning=false;phase='end';
  let msg;
  if(roundTimer<=0){
    // Compare HP ratios so asymmetric maxHp doesn't auto-favor the tankier fighter.
    const r1=p1.hp/p1.maxHp, r2=p2.hp/p2.maxHp;
    if(r1>r2){msg='MARK WINS — TIME';p1.win=true;}
    else if(r2>r1){msg='THRAGG WINS — TIME';p2.win=true;}
    else msg='DRAW';
  }else if(p1.hp<=0&&p2.hp<=0){msg='DRAW';}
  else if(p1.hp<=0){msg='THRAGG WINS';p2.win=true;}
  else{msg='MARK WINS';p1.win=true;}
  if(p1.win) p1.state=S.VICTORY;if(p2.win) p2.state=S.VICTORY;
  document.getElementById('status').textContent=msg;
  setTimeout(()=>{
    document.getElementById('overlay').style.display='flex';
    document.getElementById('startBtn').textContent='REMATCH';
  },2900);
}

// ═══════════════ MAIN DRAW ═══════════════
function drawFrame(){
  frameCount++;
  if(shakeAmt>0.4){
    shakeX=(Math.random()-.5)*shakeAmt;shakeY=(Math.random()-.5)*shakeAmt;shakeAmt*=0.79;
  }else{shakeX=shakeY=shakeAmt=0;}
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBG();
  if(flashFrames>0){ctx.fillStyle=flashColor;ctx.fillRect(0,0,CW,CH);flashFrames--;}

  // Distortion rings (dash warp)
  rings=rings.filter(rg=>{
    rg.r+=(rg.maxR-rg.r)*0.3;rg.life--;
    ctx.globalAlpha=rg.life/rg.ml*0.52;ctx.strokeStyle=rg.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(rg.x,rg.y,rg.r*2.2,rg.r*0.55,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;return rg.life>0;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.44;p.vx*=0.93;p.life--;
    ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.color;
    if(p.sq) ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;return p.life>0;
  });

  if(p1&&p2){const[a,b]=p1.x<p2.x?[p1,p2]:[p2,p1];drawFighter(a);drawFighter(b);}

  floats=floats.filter(ft=>{
    ft.y+=ft.vy;ft.life--;
    ctx.globalAlpha=Math.min(1,ft.life/ft.ml*1.9);ctx.fillStyle=ft.color;
    ctx.font='bold 23px "Bebas Neue",sans-serif';ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.85)';ctx.lineWidth=4;
    ctx.strokeText(ft.txt,ft.x,ft.y);ctx.fillText(ft.txt,ft.x,ft.y);
    ctx.globalAlpha=1;return ft.life>0;
  });
  if(phase==='countdown') drawCountdown();
  ctx.restore();
  updateHUD();
  if(p1ComboTimer>0){p1ComboTimer--;if(!p1ComboTimer){p1Combo=0;document.getElementById('combo1').style.opacity='0';}}
  if(p2ComboTimer>0){p2ComboTimer--;if(!p2ComboTimer){p2Combo=0;document.getElementById('combo2').style.opacity='0';}}
}

// ═══════════════ TICK ═══════════════
function tick(){
  requestAnimationFrame(tick);
  if(hitStop>0) hitStop--;
  if((phase==='fight'||phase==='countdown')&&p1&&p2){
    if(phase==='fight'&&gameRunning&&hitStop===0){
      updateFighter(p1);updateFighter(p2);botUpdate();
      if(canAct(p1)){
        // Mark hovers instead of walking; forward/back relative to facing
        if(keys['KeyA']){p1.vx=-5;if(p1.onGround)p1.state=p1.facing===-1?S.HOVER_FORWARD:S.HOVER_BACKWARDS;}
        if(keys['KeyD']){p1.vx=5;if(p1.onGround)p1.state=p1.facing===1?S.HOVER_FORWARD:S.HOVER_BACKWARDS;}
        // V6: Thragg-jump height (p2) doesn't affect player — Mark keeps vy=-16
        if(keys['KeyW']&&p1.onGround){p1.vy=-16;p1.onGround=false;p1.state=S.JUMP;}
        if(keys['KeyF']&&p1.onGround&&!isAtk(p1)&&!p1.ultActive){
          p1.state=S.BLOCK;
        }else if(!keys['KeyF']&&p1.state===S.BLOCK){p1.state=restIdle(p1);}
      }
      roundTick++;
      if(roundTick>=60){
        roundTick=0;roundTimer=Math.max(0,roundTimer-1);
        const tb=document.getElementById('tb');
        tb.textContent=roundTimer;tb.style.color=roundTimer<=10?'#ff3d00':'#fff';
      }
      checkWin();
    }
  }
  drawFrame();
}

// ═══════════════ COUNTDOWN UPDATE ═══════════════
// (called inside drawFrame via phase check — kept for clarity)

// ═══════════════ INPUT ═══════════════
document.addEventListener('keydown',e=>{
  if(!keys[e.code]){
    keys[e.code]=true;
    if(gameRunning&&phase==='fight'&&p1&&!p1.win){
      if(e.code==='KeyQ') doDash(p1);
      if(e.code==='KeyE') doAtk(p1,'punch');
      if(e.code==='KeyR') doAtk(p1,'kick');
      if(e.code==='KeyT') doAtk(p1,'grab');
      if(e.code==='KeyC') doCounter(p1);
      if(e.code==='KeyV') doUlt(p1);
    }
  }
  if(['KeyW','KeyA','KeyS','KeyD','KeyF','KeyC','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ═══════════════ START / REMATCH ═══════════════
document.getElementById('startBtn').addEventListener('click',()=>{
  initAC();
  preloadSprites();
  preloadBackground();
  p1=makeFighter(200,1,false,MAX_HP_MARK);
  p2=makeFighter(760,-1,true,MAX_HP_THRAGG);
  // Mark hovers: start in hover idle, 10px above the floor
  p1.state=S.HOVER_IDLE;p1.y=FL-HOVER_OFFSET;
  roundTimer=99;roundTick=0;
  particles=[];floats=[];rings=[];hitStop=0;shakeAmt=0;
  flashColor=null;flashFrames=0;gameRunning=false;
  phase='countdown';cdFrame=0;
  p1Combo=0;p2Combo=0;p1ComboTimer=0;p2ComboTimer=0;
  document.getElementById('combo1').style.opacity='0';
  document.getElementById('combo2').style.opacity='0';
  ['p1hp','p2hp'].forEach(id=>document.getElementById(id).style.width='100%');
  ['p1ult','p2ult'].forEach(id=>document.getElementById(id).style.width='0%');
  document.getElementById('tb').textContent='99';document.getElementById('tb').style.color='#fff';
  document.getElementById('status').textContent='';
  document.getElementById('overlay').style.display='none';
  if(!loopStarted){loopStarted=true;tick();}
});
// countdown frame update wired into drawFrame via phase check
let cdFrameTimer=setInterval(()=>{
  if(phase==='countdown'){cdFrame++;if(cdFrame>=240){phase='fight';gameRunning=true;document.getElementById('status').textContent='';}}
},1000/60);

if(!loopStarted){loopStarted=true;tick();}
preloadSprites();
preloadBackground();
</script>
